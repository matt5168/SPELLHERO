                        {!isLocked && combo >= 3 && <div className="absolute inset-0 bg-[#cca677]/10 pointer-events-none animate-pulse border-4 border-[#cca677] rounded-[2rem]"></div>}
                        
                        {/* Header */}
                        <div className={`flex w-full items-start md:items-center justify-between mb-4 border-b-2 border-[#ebe6df] pb-3 relative z-10 text-[#524d46] gap-2 flex-wrap`}>
                          <div className={`w-8 h-8 rounded-full flex items-center justify-center text-white font-black text-xs flex-shrink-0 ${q.isAI ? 'bg-[#cca677]' : (isReview ? 'bg-[#b5847e]' : 'bg-[#8b9586]')}`}>{i+1}</div>
                          <div className="flex flex-wrap gap-2 flex-1 justify-end">
                              {/* 💡 題目右上角顯示真實模型名稱 */}
                              {q.isAI && <div className="hidden sm:flex items-center gap-1 text-[11px] font-black text-[#a68258] bg-[#f4ebd9] px-2 py-1 rounded-lg border border-[#e0c9aa] shadow-sm"><Sparkles size={14}/> {q.modelName || 'AI MODEL'}</div>}
                              {!q.isAI && <div className="hidden sm:flex items-center gap-1 text-[11px] font-black text-[#8a847c] bg-[#ebe6df] px-2 py-1 rounded-lg border border-[#d6cfc5] shadow-sm"><BookOpen size={14}/> OFFLINE</div>}
                          </div>
                        </div>

                        {/* Body Layout Wrapper */}
                        <div className={isLayout2 ? 'grid grid-cols-1 md:grid-cols-2 gap-6 w-full' : 'w-full flex flex-col items-center'}>
                            
                            {/* Left Side (or Full Width) */}
                            <div className={`w-full flex flex-col ${isLayout2 ? 'items-start' : 'items-center'} relative z-10`}>
                                <div className={`text-xl md:text-3xl font-bold leading-normal md:leading-relaxed break-words mt-2 ${!q.isAI ? 'text-[#8a847c]' : 'text-[#524d46]'} ${!isLayout2 && 'text-center'}`}>
                                  <span>{SYSTEM_ENGINE.capitalize(p0)}</span>
                                  <span className={`mx-1 inline-block ${!isLocked && hintMask.indexOf('_') !== -1 && mainMenu !== 'grammar' ? 'tracking-[0.2em]' : ''} ${isLocked ? (isFinallyCorrect ? "text-[#7a8575]" : "text-[#b5847e] line-through decoration-[#b5847e] decoration-[3px]") : (combo >= 3 ? "text-[#cca677]" : "text-[#8b9586]")} transition-colors duration-300`}>{isLocked ? (currentAns || '______') : hintMask}</span>
                                  <span>{p1}</span>
                                  
                                  <button onClick={() => playTTS(q.sentence, true, safeAnswerStr)} className={`ml-3 inline-flex items-center justify-center p-2 rounded-full transition-all active:scale-90 align-middle ${isLocked ? 'bg-[#e6e9e4] text-[#6b7566] hover:bg-[#d5dcd3]' : 'bg-[#f4ebd9] text-[#cca677] hover:bg-[#eadecc]'}`}>
                                      <Volume2 size={24}/>
                                  </button>
                                </div>

                                {isLocked && q.translation && (
                                    <div className={`text-base md:text-lg font-bold text-[#7a8575] mt-3 animate-in fade-in slide-in-from-top-2 ${!isLayout2 && 'text-center'}`}>
                                        {q.translation}
                                    </div>
                                )}

                                {/* Input & Submit */}
                                {(!isLocked || (isLocked && isLayout2) || (isLocked && isLayout1)) && (!isLayout3 || !isLocked) && (
                                    <div className={`mt-6 w-full ${isLayout2 ? 'max-w-sm' : 'max-w-sm'}`}>
                                        {quizMode === 'multiple_choice' && !isLocked && (
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full">
                                                {(q.options || []).map((opt, optIdx) => (
                                                    <div key={optIdx} className="relative flex w-full">
                                                        <button disabled={submitted} onClick={() => handleCheckSingle(i, opt)} className="bg-white border-2 border-[#d6cfc5] hover:border-[#8b9586] hover:bg-[#e6e9e4] text-[#524d46] font-black text-lg py-3 px-5 rounded-xl shadow-sm active:scale-95 transition-all text-left flex-grow pr-12">{opt}</button>
                                                        <button onClick={e => { e.stopPropagation(); playTTS(opt, false, ''); }} className="absolute right-2 top-1/2 transform -translate-y-1/2 p-2 text-[#8a847c] hover:bg-[#c4cec1] hover:text-[#524d46] rounded-full transition-all active:scale-90"><Megaphone size={18} /></button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {quizMode === 'fill_in' && !isLocked && (
                                            <div className={`flex flex-row items-center w-full gap-2`}>
                                              <input type="text" value={String(answers[i] || "")} onChange={e => { const n = [...answers]; n[i] = e.target.value.replace(/^\s+/, ''); setAnswers(n); }} onKeyDown={e => {if(e.key==='Enter') handleCheckSingle(i);}} onFocus={e => { if(config.autoRead) playTTS(q.sentence, true, safeAnswerStr); setTimeout(() => e.target.scrollIntoView({behavior:'smooth', block:'center'}), 300); }} autoComplete="off" spellCheck="false" placeholder="在此拼字..." className={`flex-1 min-w-0 appearance-none bg-white border-b-4 border-[#d6cfc5] focus:border-[#8b9586] focus:bg-white text-[#524d46] text-xl md:text-2xl font-mono font-black text-center p-3 rounded-xl outline-none shadow-sm placeholder:text-[#b8b3aa] ${combo>=3?'border-[#cca677] bg-[#f4ebd9] focus:bg-[#f4ebd9]':''}`} />
                                              <button onClick={() => handleCheckSingle(i)} className={`text-white text-lg md:text-xl font-black px-5 py-3 rounded-xl flex items-center justify-center gap-2 active:scale-95 shadow transition-all ${combo>=3?'bg-[#cca677] hover:bg-[#b89063] border-b-4 border-[#a68258]':'bg-[#8b9586] hover:bg-[#7a8575] border-b-4 border-[#6b7566]'}`}>{combo>=3?<Flame size={20} className="fill-white animate-pulse" fill="currentColor"/>:<Send size={20} className="text-white" fill="currentColor"/>}</button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* Right Side (or Below) */}
                            <div className={`w-full flex flex-col justify-center ${isLayout2 ? 'items-end md:border-l-2 md:border-[#ebe6df] md:pl-6' : 'items-center mt-6'} relative z-10`}>
                                
                                {/* Tools */}
                                {(!isLocked || (isLayout2 && isLocked)) && (!isLayout3 || !isLocked) && (
                                    <div className={`flex flex-wrap gap-3 w-full ${isLayout2 ? 'justify-end' : 'justify-center'} ${quizMode==='multiple_choice' ? 'hidden md:flex' : ''}`}>
                                      <button onClick={() => playTTS(safeAnswerStr, false)} className="text-sm md:text-base font-black text-[#8c6b44] bg-[#f4ebd9] px-4 md:px-6 py-3 rounded-xl active:scale-95 border border-[#e0c9aa] flex items-center gap-2 shadow-sm hover:bg-[#eadecc]"><Megaphone size={20} /> 單字發音</button>
                                      
                                      {mainMenu !== 'grammar' && (
                                          <button onClick={() => { 
                                              const nh=[...hints]; nh[i]=!nh[i]; setHints(nh); 
                                              if(nh[i] && q.isAI && !dynamicContent[`hint_${i}`]) { handleOnDemand(i, 'hint'); }
                                          }} className="text-sm md:text-base font-black text-[#7a8575] bg-[#e6e9e4] px-4 md:px-6 py-3 rounded-xl active:scale-95 border border-[#c4cec1] flex items-center gap-2 shadow-sm hover:bg-[#d5dcd3]"><Lightbulb size={20} className={hints[i]?"text-[#cca677]":""}/> 單字提示</button>
                                      )}
                                    </div>
                                )}

                                {/* Hints Content */}
                                {hints[i] && mainMenu !== 'grammar' && !isLocked && (
                                    <div className={`p-4 bg-[#f4ebd9]/80 rounded-xl border-2 border-dashed border-[#e0c9aa] mt-4 shadow-sm w-full ${isLayout2 ? 'max-w-sm' : 'max-w-md'} animate-in zoom-in`}>
                                        <div className="text-base md:text-lg font-bold text-[#8c6b44] leading-relaxed text-center">
                                            💡 {q.isAI ? (
                                                dynamicContent[`hint_${i}`] || loadingStates[`hint_${i}`] ? (
                                                    loadingStates[`hint_${i}`] && !dynamicContent[`hint_${i}`] ? 
                                                    <span className="animate-pulse inline-flex items-center gap-2"><Loader2 className="animate-spin" size={16}/> 尋找提示中...</span> : 
                                                    renderFormattedText(dynamicContent[`hint_${i}`])
                                                ) : renderFormattedText(q.hint || "無提示")
                                            ) : renderFormattedText(q.hint || "無提示")}
                                        </div>
                                    </div>
                                )}

                                {/* Result Display (Locked State) */}
                                {isLocked && (
                                    <div className={`w-full flex flex-col animate-in zoom-in slide-in-from-bottom-4 ${isLayout3 ? 'bg-[#f4ebd9] p-8 rounded-[2rem] border-8 border-white shadow-xl mt-6' : (isLayout2 ? 'bg-[#e6e9e4] p-6 rounded-2xl' : 'bg-[#e6e9e4] p-6 rounded-2xl mt-6 max-w-lg')}`}>
                                        {isFinallyCorrect ? (
                                            <div className="flex flex-col items-center justify-center text-center py-4">
                                                <CheckCircle size={48} className="text-[#8b9586] mb-3 drop-shadow-sm animate-bounce"/>
                                                <div className="text-2xl md:text-3xl font-black text-[#6b7566]">答對了！</div>
                                                <button onClick={() => playTTS(safeAnswerStr, false)} className="mt-4 text-[#8b9586] font-bold hover:text-[#6b7566] transition-colors flex items-center gap-1"><Volume2 size={16}/> 聽聽發音</button>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col items-center text-center relative w-full">
                                                <div className="absolute -top-10 bg-[#b5847e] text-white px-4 py-1.5 rounded-full font-black shadow-md border-2 border-white flex items-center gap-2"><XCircle size={16}/> 拼字錯誤</div>
                                                <span className="text-sm font-bold text-[#a6a198] mt-2 mb-1">正確答案</span>
                                                <div className="text-4xl md:text-5xl font-black text-[#524d46] tracking-[0.1em] my-2 underline decoration-[#cca677] decoration-4 underline-offset-8 cursor-pointer hover:text-[#cca677] transition-colors" onClick={() => playTTS(safeAnswerStr, false)}>{safeAnswerStr}</div>
                                                
                                                {(q.hint || dynamicContent[`hint_${i}`]) && (
                                                    <div className="text-lg md:text-xl font-black text-[#8c6b44] mt-1 mb-2 animate-in zoom-in">
                                                        {dynamicContent[`hint_${i}`] || q.hint}
                                                    </div>
                                                )}
                                                
                                                <button onClick={() => playTTS(safeAnswerStr, false)} className="mt-4 bg-white text-[#8c6b44] px-5 py-2.5 rounded-full font-black shadow-sm border border-[#e0c9aa] hover:bg-[#f4ebd9] transition-all flex items-center gap-2 active:scale-95"><Megaphone size={18}/> 聆聽發音</button>
                                            </div>
                                        )}

                                        {mainMenu === 'grammar' && !isFinallyCorrect && (
                                            <div className={`mt-6 border-t-2 pt-4 w-full text-left ${isLayout3 ? 'border-[#e0c9aa]' : 'border-[#c4cec1]'}`}>
                                                <div className="font-black text-[#7a8575] mb-3 flex items-center gap-1.5"><GraduationCap size={18}/> AI 老師文法解題</div>
                                                {q.isAI ? (
                                                    dynamicContent[`exp_${i}`] ? (
                                                        <div className="animate-in fade-in bg-white p-4 rounded-xl border border-[#d6cfc5] shadow-sm">
                                                            <div className="text-[#524d46] text-sm md:text-base mb-3 leading-relaxed">
                                                                {renderFormattedText(dynamicContent[`exp_${i}`])}
                                                            </div>
                                                            <div className="flex flex-wrap items-center justify-between gap-2 border-t border-[#d6cfc5] pt-3 mt-1">
                                                                <div className="flex items-center gap-1 text-[10px] text-[#8a847c]">
                                                                    為解說評分：
                                                                    <button onClick={() => handleVote(dynamicProviders[`exp_${i}`], 1)} className="p-1 bg-[#e6e9e4] hover:bg-[#c4cec1] rounded transition-all active:scale-90" title="讚！這解釋很清楚"><ThumbsUp size={14} className="text-[#6b7566]"/></button>
                                                                    <button onClick={() => handleVote(dynamicProviders[`exp_${i}`], -1)} className="p-1 bg-[#f2e7e6] hover:bg-[#dcb5b0] rounded transition-all active:scale-90" title="聽不懂..."><ThumbsDown size={14} className="text-[#b5847e]"/></button>
                                                                </div>
                                                                <button onClick={() => handleOnDemand(i, 'exp', true)} className="text-xs font-bold text-[#b5847e] bg-[#f2e7e6] hover:bg-[#e8d5d3] px-2 py-1 rounded border border-[#dcb5b0] transition-colors flex items-center gap-1 shadow-sm active:scale-95">
                                                                    <RefreshCcw size={12}/> 換老師說明
                                                                </button>
                                                            </div>
                                                        </div>
                                                    ) : loadingStates[`exp_${i}`] ? (
                                                        <span className="animate-pulse flex items-center gap-2 text-[#8b9586] font-bold"><Loader2 className="animate-spin" size={16}/> 老師正在思考中...</span>
                                                    ) : (
                                                        <div>
                                                            <span className="text-[#8a847c] text-sm mb-3 block">{renderFormattedText(q.explanation || "此題需要進一步的文法解析。")}</span>
                                                            <button onClick={() => handleOnDemand(i, 'exp')} className="bg-white hover:bg-[#e6e9e4] text-[#524d46] px-4 py-2 rounded-xl text-sm font-bold border border-[#c4cec1] shadow-sm transition-all flex items-center gap-1.5 active:scale-95"><Sparkles size={16} className="text-[#cca677]"/> 呼叫 AI 老師解說</button>
                                                        </div>
                                                    )
                                                ) : (
                                                    <div className="bg-white/50 p-3 rounded-lg border border-[#c4cec1] text-[#8a847c] text-sm">{renderFormattedText(q.explanation || "此題為離線題庫，請向老師詢問相關文法規則喔！")}</div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                      </div>
                    );
                  })}
                  
                  {isGenerating && questions.length > 0 && questions.length < Math.min(25, (mainMenu === 'grammar' ? getActiveGrammarDB(selectedNotebooks).length : getActiveDB(selectedNotebooks, vocabMode).length)) && (
                      <div className="bg-[#e6e9e4]/50 rounded-[2rem] border-[3px] border-dashed border-[#c4cec1] p-8 flex flex-col items-center justify-center gap-3 animate-pulse opacity-70">
                          <Loader2 size={32} className="text-[#8b9586] animate-spin" />
                          <div className="text-[#6b7566] font-bold text-sm tracking-widest">AI 正在為您產生下一題...</div>
                      </div>
                  )}
                </div>

                {questions.length > 0 && (
                  <div className="mt-10 mb-20 text-center">
                    {!submitted ? (
                      <button onClick={handleGradeAll} disabled={isGenerating && !ready} className={`w-full bg-[#8b9586] hover:bg-[#7a8575] text-white px-8 py-5 md:py-6 rounded-3xl text-2xl md:text-4xl font-black shadow-[0_8px_0_#6b7566] hover:shadow-[0_4px_0_#6b7566] active:shadow-none transform transition active:translate-y-2 flex justify-center items-center gap-3 tracking-wide ${(isGenerating && !ready) ? 'opacity-50 cursor-not-allowed' : ''}`}><CheckCircle size={36} className="hidden sm:block" /> {(isGenerating && !ready) ? '等待 AI 準備題目中...' : '檢查我的答案！ ✍️'}</button>
                    ) : (
                      <div className="space-y-8 animate-in zoom-in text-center">
                        <div className="bg-[#f4ebd9] p-8 rounded-[3rem] border-[8px] border-white shadow-xl relative w-full text-center">
                           {finalScoreCount === questions.length && <div className="absolute -top-12 left-1/2 -translate-x-1/2 text-7xl md:text-8xl animate-bounce drop-shadow-xl">👑</div>}
                           <Trophy size={60} className="mx-auto text-[#cca677] mb-4" />
                           <div className="text-6xl md:text-7xl font-black text-[#b89063]">{finalScoreCount} <span className="text-3xl text-[#b8b3aa]">/ {questions.length}</span></div>
                           <p className="text-lg md:text-xl font-black text-[#8c6b44] mt-3 uppercase tracking-widest italic">挑戰結算完成！</p>
                           <div className="flex flex-col sm:flex-row justify-center items-center gap-3 mt-6">
                               <div className={`text-[#8c6b44] font-black text-lg py-2 px-5 rounded-full inline-flex items-center gap-1.5 shadow border-2 ${maxCombo>=3?'bg-[#eadecc] border-[#cca677] animate-pulse':'bg-white border-[#e0c9aa]'}`}><Coins size={24} className="text-[#cca677]" /> +{earnedCoins} 金幣 {maxCombo>=3 && <span className="text-xs bg-[#b5847e] text-white px-2 py-0.5 rounded-full ml-1">Combo x2!</span>}</div>
                               <div className="bg-[#8b9586] text-white font-black text-lg py-2 px-5 rounded-full inline-flex items-center gap-1.5 shadow border-2 border-[#7a8575]"><TrendingUp size={24} className="text-[#e6e9e4]" /> +{earnedExp} EXP</div>
                           </div>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-3 justify-center items-center">
                            <button onClick={() => {setIsReview(false); handleMainMenuChange('vocab');}} className="w-full sm:w-1/2 bg-[#8b9586] text-white py-4 md:py-5 rounded-3xl text-xl font-black shadow-lg border-b-4 border-[#6b7566] flex items-center justify-center gap-2 active:scale-95 transition-all"><Shuffle size={24} className="text-[#e6e9e4]" fill="currentColor"/> <span className="text-white">繼續單字測驗</span></button>
                            <button onClick={() => {setIsReview(false); handleMainMenuChange('grammar');}} className="w-full sm:w-1/2 bg-[#968b95] text-white py-4 md:py-5 rounded-3xl text-xl font-black shadow-lg border-b-4 border-[#7f7680] flex items-center justify-center gap-2 active:scale-95 transition-all"><Sparkles size={24} className="text-[#e9e6e8]" fill="currentColor"/> <span className="text-white">切換文法測驗</span></button>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </main>
              )}
            </div>
          );
        }

        const App = () => <ErrorBoundary><SpellingHeroApp /></ErrorBoundary>;
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
