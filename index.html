<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Hero - 互動家教版 (多重文法題型 v25.4 極簡架構版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <script src="database.js?v=12"></script>
    <script src="engine.js?v=9"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: manipulation; }
        .combo-text { text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #ebe6df; }
        ::-webkit-scrollbar-thumb { background: #c5bbae; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a69a8a; }
        .terminal-scroll::-webkit-scrollbar { width: 4px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #3d3935; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #6b655f; border-radius: 2px; }
    </style>
</head>
<body class="bg-[#ebe6df] text-[#524d46] overflow-x-hidden relative text-left min-h-screen pb-[40vh]">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, Component, useRef } = React;

        const IconMock = emoji => props => <span className={props.className||""} style={{fontSize: props.size||20, display:'inline-flex', alignItems:'center', justifyContent:'center', lineHeight: 1}}>{emoji}</span>;
        const CheckCircle=IconMock('✅'), XCircle=IconMock('❌'), RefreshCcw=IconMock('🔄'), Star=IconMock('⭐'), Trophy=IconMock('🏆'), Lightbulb=IconMock('💡'), Sparkles=IconMock('✨'), Shuffle=IconMock('🔀'), BookOpen=IconMock('📖'), AlertOctagon=IconMock('⚠️'), GraduationCap=IconMock('🎓'), Loader2=IconMock('⏳'), Volume2=IconMock('🔊'), Megaphone=IconMock('📢'), Settings=IconMock('⚙️'), Zap=IconMock('⚡'), Globe=IconMock('🌐'), History=IconMock('🕒'), Calendar=IconMock('📅'), BrainCircuit=IconMock('🧠'), Target=IconMock('🎯'), ChevronDown=IconMock('🔽'), ChevronUp=IconMock('🔼'), Send=IconMock('🚀'), Coins=IconMock('🪙'), BarChart2=IconMock('📊'), Activity=IconMock('📈'), Award=IconMock('🏅'), TrendingUp=IconMock('📈'), Flame=IconMock('🔥'), ShieldCheck=IconMock('🛡️'), Edit3=IconMock('📝'), MousePointerClick=IconMock('🖱️'), AlignLeft=IconMock('📑'), Database=IconMock('🗄️'), ScrollText=IconMock('📜'), Layout=IconMock('🗂️');

        class ErrorBoundary extends Component {
          constructor(props) { super(props); this.state = { hasError: false, errorInfo: "" }; }
          static getDerivedStateFromError(error) { return { hasError: true }; }
          componentCatch(error, info) { this.setState({ errorInfo: error.toString() }); }
          render() { 
            if (this.state.hasError) {
              return (
                <div className="p-6 bg-[#b5847e]/20 text-[#524d46] min-h-screen font-mono text-center flex flex-col items-center justify-center">
                  <h1 className="text-2xl font-black mb-4">⚠️ 系統錯誤</h1>
                  <p className="bg-[#f4f1ea] border border-[#dcb5b0] p-4 rounded-xl mb-6 text-xs max-w-lg overflow-auto shadow-sm text-left">{this.state.errorInfo}</p>
                  <p className="text-sm text-[#a3756f] mb-6">請確認相關 JS 檔案是否正確載入。</p>
                  <button onClick={() => window.location.reload()} className="bg-[#b5847e] text-white hover:bg-[#a3756f] px-6 py-2 rounded-full font-bold shadow transition-all">重新載入</button>
                </div>
              );
            } return this.props.children;
          }
        }

        function SpellingHeroApp() {
          const [questions, setQuestions] = useState([]); const [answers, setAnswers] = useState([]);
          const [submitted, setSubmitted] = useState(false); const [hints, setHints] = useState([]);
          const [qStatus, setQStatus] = useState([]); 
          const [ready, setReady] = useState(false); const [mistakePool, setMistakePool] = useState([]); 
          const [isReview, setIsReview] = useState(false); const [config, setConfig] = useState({ accent: 'US', speed: 0.9, autoRead: true });
          
          const [selectedNotebooks, setSelectedNotebooks] = useState(['All']); 
          const [isCustomMulti, setIsCustomMulti] = useState(false);
          const [vocabMode, setVocabMode] = useState('mixed'); 
          const [grammarMode, setGrammarMode] = useState('mixed'); 
          const [mainMenu, setMainMenu] = useState('vocab'); 
          const [storage, setStorage] = useState({ history: [], memory: {}, stats: {}, coins: 0, exp: 0, level: 1 });
          const [dash, setDash] = useState(false); const [earnedCoins, setEarnedCoins] = useState(0); 
          const [earnedExp, setEarnedExp] = useState(0); const [levelUpData, setLevelUpData] = useState(null);
          const [redeemAmount, setRedeemAmount] = useState(100); const [redeemMessage, setRedeemMessage] = useState("");
          
          const isGeneratingRef = useRef(false);
          const [isGenerating, setIsGenerating] = useState(false); 
          const [showFallbackAlert, setShowFallbackAlert] = useState(false);
          const [alertMessage, setAlertMessage] = useState(""); 
          
          const [uiLayout, setUiLayout] = useState(localStorage.getItem('sh_ui_layout') || 'layout1');
          const [ttsEngine, setTtsEngine] = useState(localStorage.getItem('sh_tts_engine') || 'native');
          
          const getVal = (funcName, fallback) => (window[funcName] ? window[funcName]() : fallback);
          
          const [openAITtsKey, setOpenAITtsKey] = useState(getVal('getOpenAITtsKey', ''));
          const [openAITtsVoice, setOpenAITtsVoice] = useState(localStorage.getItem('sh_openai_tts_voice') || 'nova');
          const [inputKey, setInputKey] = useState(getVal('getGeminiKey', ''));
          const [inputOrKey, setInputOrKey] = useState(getVal('getOpenRouterKey', ''));
          const [openRouterModel, setOpenRouterModel] = useState(localStorage.getItem('sh_or_model') || 'openrouter/auto');
          const [inputGroqKey, setInputGroqKey] = useState(getVal('getGroqKey', ''));
          const [groqModel, setGroqModel] = useState(localStorage.getItem('sh_groq_model') || 'llama-3.3-70b-versatile');
          const [groqModelsList, setGroqModelsList] = useState(["llama-3.3-70b-versatile", "llama-3.1-8b-instant", "mixtral-8x7b-32768", "gemma2-9b-it"]);
          const [defaultTeacher, setDefaultTeacher] = useState(localStorage.getItem('sh_default_teacher') || 'openrouter');
          
          const [enginesEnabled, setEnginesEnabled] = useState({
              groq: localStorage.getItem('sh_enable_groq') !== 'false',
              google: localStorage.getItem('sh_enable_google') !== 'false',
              openrouter: localStorage.getItem('sh_enable_or') !== 'false',
              openai: localStorage.getItem('sh_enable_openai') !== 'false'
          });
          
          // [關鍵修正 1] 初始化狀態：嚴格遵守儲存的模型，移除舊版會覆蓋邏輯的變數定義
          const [activeGeminiModel, setActiveGeminiModel] = useState(localStorage.getItem('sh_gemini_model_selected') || "gemini-2.0-flash"); 
          const [geminiModelsList, setGeminiModelsList] = useState(window.GEMINI_DEFAULT_MODELS || ["gemini-2.5-flash","gemini-2.0-flash","gemma-3-27b-it","gemma-3n-e4b-it"]);
          const [aiModel, setAiModel] = useState("偵測中...");

          const toggleEngine = (eng) => {
              setEnginesEnabled(p => {
                  const next = {...p, [eng]: !p[eng]};
                  localStorage.setItem(`sh_enable_${eng}`, next[eng]);
                  return next;
              });
          };

          const [promptMode, setPromptMode] = useState(localStorage.getItem('sh_prompt_mode') || 'v1');
          const [grammarFixMode, setGrammarFixMode] = useState(localStorage.getItem('sh_grammar_fix_mode') || 'rule');
          const [customPromptText, setCustomPromptText] = useState(localStorage.getItem('sh_custom_prompt') || "");
          
          const [apiUsage, setApiUsage] = useState({ date: new Date().toLocaleDateString(), openRouter: 0, gemini: 0, groq: 0, openai: 0 });
          const [combo, setCombo] = useState(0); const [maxCombo, setMaxCombo] = useState(0);
          const [showComboAnim, setShowComboAnim] = useState(false); const [diagStatus, setDiagStatus] = useState(null); 
          const [diagMsg, setDiagMsg] = useState(""); const [quizMode, setQuizMode] = useState('fill_in'); 
          const [aiStatus, setAiStatus] = useState("準備中..."); 
          
          const [aiLogs, setAiLogs] = useState(() => JSON.parse(localStorage.getItem('sh_logs') || '[]'));
          const [showLogsPanel, setShowLogsPanel] = useState(false);
          const [poolStats, setPoolStats] = useState({ cached: 0, fetched: 0, size: 0 });
          const [dynamicContent, setDynamicContent] = useState({});
          const [loadingStates, setLoadingStates] = useState({});
          const [dynamicModels, setDynamicModels] = useState({}); 
          const [dynamicProviders, setDynamicProviders] = useState({}); 
          
          const [routingMode, setRoutingMode] = useState(localStorage.getItem('sh_routing_mode') || 'dynamic');
          const [engineLights, setEngineLights] = useState({ groq: 'green', google: 'green', openrouter: 'green', openai: 'green' });

          const overrideTriggeredRef = useRef({});
          const readyRef = useRef(false);

          useEffect(() => {
              if (!dash || !window.sharedAIClient) return;
              const timer = setInterval(() => {
                  setEngineLights({
                      groq: window.sharedAIClient.getEngineStatus('groq'),
                      google: window.sharedAIClient.getEngineStatus('google'),
                      openrouter: window.sharedAIClient.getEngineStatus('openrouter'),
                      openai: window.sharedAIClient.getEngineStatus('openai')
                  });
              }, 1000);
              return () => clearInterval(timer);
          }, [dash]);

          // 動態抓取清單，但「絕對不自動覆蓋」使用者選好的 activeGeminiModel
          useEffect(() => {
              if (dash && window.sharedAIClient && inputKey && enginesEnabled.google) {
                  if (typeof window.sharedAIClient.checkAvailableGeminiModels === 'function') {
                      window.sharedAIClient.checkAvailableGeminiModels().then(models => {
                          if (models && models.length > 0) {
                              setGeminiModelsList(models);
                              // 只有在當前選的模型不在新清單內時，才做防呆轉向
                              const current = localStorage.getItem('sh_gemini_model_selected');
                              if (current && !models.includes(current)) {
                                  // 如果現有的模型已經失效，才切換到清單第一個
                                  setActiveGeminiModel(models[0]);
                                  localStorage.setItem('sh_gemini_model_selected', models[0]);
                              }
                          }
                      });
                  }
              }
          }, [dash, inputKey, enginesEnabled.google]);

          const addLog = msg => {
              setAiLogs(p => {
                  const newLogs = [...p, "[" + new Date().toLocaleTimeString('en-US', { hour12: false }) + "] " + msg].slice(-50);
                  try { localStorage.setItem('sh_logs', JSON.stringify(newLogs)); } catch(e){}
                  return newLogs;
              });
          };

          const showAlert = msg => { setAlertMessage(msg); setShowFallbackAlert(true); setTimeout(() => setShowFallbackAlert(false), 4000); };

          useEffect(() => {
            const load = () => {
              try {
                const h = JSON.parse(localStorage.getItem('sh_h_v28') || '[]');
                const m = JSON.parse(localStorage.getItem('sh_m_v28') || '{}');
                const s = JSON.parse(localStorage.getItem('sh_s_v28') || '{}');
                const c = parseInt(localStorage.getItem('sh_coins_v28') || '0');
                const exp = parseInt(localStorage.getItem('sh_exp_v28') || '0');
                const lvl = parseInt(localStorage.getItem('sh_level_v28') || '1');
                const today = new Date().toLocaleDateString();
                
                let mist = JSON.parse(localStorage.getItem('sh_mistakes_v29') || '[]');
                let apiU = JSON.parse(localStorage.getItem('sh_api_usage_v29') || 'null'); 
                if (!apiU || apiU.date !== today) apiU = { date: today, openRouter: 0, gemini: 0, groq: 0, openai: 0 };
                
                setStorage({ history: h, memory: m, stats: s, coins: c, exp: exp, level: lvl }); 
                setMistakePool(mist); 
                setApiUsage(apiU); 

                if (window.sharedAIClient) {
                    window.sharedAIClient.updateKeys(inputKey, inputOrKey, inputGroqKey, openAITtsKey);
                    // [關鍵修正 2] 載入時只呼叫背景檢測，徹底移除對 activeGeminiModel 的強制寫入
                    window.sharedAIClient.checkAvailableModels();
                }
              } catch (e) { }
            }; load();
          }, []);

          // [關鍵修正 3] 儲存函式優化：只儲存，不允許從 API 回傳值覆寫當前 UI 選擇
          const saveCustomKey = () => { 
              try { 
                  localStorage.setItem('gemini_api_key', window.Obfuscator.encode(inputKey));
                  localStorage.setItem('openrouter_api_key', window.Obfuscator.encode(inputOrKey)); 
                  localStorage.setItem('sh_or_model', openRouterModel); 
                  localStorage.setItem('groq_api_key', window.Obfuscator.encode(inputGroqKey)); 
                  localStorage.setItem('sh_groq_model', groqModel); 
                  localStorage.setItem('sh_gemini_model_selected', activeGeminiModel);
                  localStorage.setItem('sh_tts_engine', ttsEngine); 
                  localStorage.setItem('sh_openai_tts_key', window.Obfuscator.encode(openAITtsKey)); 
                  localStorage.setItem('sh_openai_tts_voice', openAITtsVoice); 
                  localStorage.setItem('sh_prompt_mode', promptMode);
                  localStorage.setItem('sh_default_teacher', defaultTeacher);

                  setDiagMsg("✅ 設定已儲存！已鎖定模型：" + activeGeminiModel); 
                  if(window.sharedAIClient) {
                      window.sharedAIClient.updateKeys(inputKey, inputOrKey, inputGroqKey, openAITtsKey); 
                      // 僅做背景連線確認，不更新 UI 模型狀態
                      window.sharedAIClient.checkAvailableModels();
                  }
              } catch(e) { setDiagMsg("❌ 儲存失敗。"); } 
          };

          const runDiagnostic = async () => {
            if(!window.sharedAIClient) return;
            setDiagStatus('testing'); setDiagMsg(`測試連線中...`); 
            try {
                // [關鍵修正 4] 診斷時不允許覆寫使用者選取的模型
                await window.sharedAIClient.checkAvailableModels();
                
                const testMsg = 'Reply exact JSON: {"questions": [{"idx":0, "a": "a", "s": "a", "h": "a", "o": ["a","b","c","d"]}]}';
                const providersToTry = ['groq', 'google', 'openrouter', 'openai'].filter(p => enginesEnabled[p]);
                if(providersToTry.length === 0) throw new Error("無啟用引擎");

                let result = null;
                for (let currentP of providersToTry) {
                    try {
                        if (currentP === 'groq') result = await window.sharedAIClient.callGroq("Diagnostic", testMsg, null, () => {}, addLog, groqModel, 'micro');
                        else if (currentP === 'google') result = await window.sharedAIClient.callGemini(activeGeminiModel, "Diagnostic", testMsg, null, () => {}, addLog, 'micro');
                        else if (currentP === 'openrouter') result = await window.sharedAIClient.callOpenRouter("Diagnostic", testMsg, null, () => {}, addLog, openRouterModel, 'micro');
                        else if (currentP === 'openai') result = await window.sharedAIClient.callOpenAI("Diagnostic", testMsg, null, () => {}, addLog, 'gpt-4o-mini', 'micro');
                        break;
                    } catch (e) { if (currentP === providersToTry[providersToTry.length-1]) throw e; }
                }
                setAiModel(result.modelName); setDiagStatus('success'); setDiagMsg("✅ 連線正常！");
            } catch (e) { setDiagStatus('error'); setDiagMsg(`❌ ${e.message}`); }
          };

          // --- 核心邏輯結束，下方為 UI 渲染 (與之前版本一致，但整合了修正後的狀態) ---

          // ... (中間的 API 生成與輔助函式省略，維持原邏輯) ...
          const generateAIBatch = (m, nbs, mode, targetMenu, forceGeminiModel) => { /* ...維持原邏輯... */ };
          const handleCheckSingle = (index, forcedAnswer) => { /* ...維持原邏輯... */ };

          return (
            <div className="min-h-screen bg-[#ebe6df] font-sans text-[#524d46] pb-[40vh]">
              {/* 導航與 Header */}
              <nav className="bg-[#ebe6df] p-2 shadow-sm sticky top-0 z-[150] border-b border-[#d6cfc5] flex justify-center">
                  <div className="max-w-4xl w-full flex gap-2">
                      <button onClick={() => setMainMenu('vocab')} className={`flex-1 py-3 rounded-xl font-bold ${mainMenu==='vocab'?'bg-[#8b9586] text-white':'bg-[#f4f1ea]'}`}>單字測驗</button>
                      <button onClick={() => setMainMenu('grammar')} className={`flex-1 py-3 rounded-xl font-bold ${mainMenu==='grammar'?'bg-[#968b95] text-white':'bg-[#f4f1ea]'}`}>文法測驗</button>
                      <button onClick={() => setDash(!dash)} className="bg-[#f4f1ea] p-3 rounded-xl shadow-sm"><Settings size={20}/></button>
                  </div>
              </nav>

              {/* 設定面板 */}
              {dash && (
                <div className="max-w-4xl mx-auto p-4 animate-in slide-in-from-top duration-300">
                  <div className="bg-[#8b9586] text-white p-6 rounded-3xl border-4 border-[#7a8575] shadow-lg">
                    <h3 className="text-xl font-black mb-4 flex items-center gap-2">⚙️ 核心引擎與模型設定</h3>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Google Gemini 設定區 */}
                        <div className="bg-[#6b7566] p-4 rounded-2xl border border-[#5a6356]">
                            <label className="block text-sm font-bold mb-2">Google Gemini API Key</label>
                            <input type="password" value={inputKey} onChange={e => setInputKey(e.target.value)} className="w-full bg-[#3d3935] border-none rounded-lg p-2 text-white font-mono mb-4" />
                            
                            <label className="block text-sm font-bold mb-1">Gemini 模型選擇 (推薦使用最新版)</label>
                            <div className="flex gap-2">
                                <select 
                                    value={activeGeminiModel} 
                                    onChange={e => {
                                        setActiveGeminiModel(e.target.value);
                                        localStorage.setItem('sh_gemini_model_selected', e.target.value);
                                    }}
                                    className="flex-1 bg-[#3d3935] text-white rounded-lg p-2 font-mono outline-none"
                                >
                                    {geminiModelsList.map(m => <option key={m} value={m}>{m}</option>)}
                                </select>
                                <button onClick={runDiagnostic} className="bg-[#cca677] px-4 py-2 rounded-lg font-bold">測試</button>
                            </div>
                            <p className="text-[10px] text-[#c4cec1] mt-2 italic">※ 目前鎖定：{activeGeminiModel} (含最新 Gemma 4 支援)</p>
                        </div>

                        {/* 其他引擎設定 */}
                        <div className="bg-[#6b7566] p-4 rounded-2xl border border-[#5a6356]">
                            <label className="block text-sm font-bold mb-2">Groq API Key</label>
                            <input type="password" value={inputGroqKey} onChange={e => setInputGroqKey(e.target.value)} className="w-full bg-[#3d3935] border-none rounded-lg p-2 text-white font-mono mb-4" />
                            <label className="block text-sm font-bold mb-1">預設解說老師</label>
                            <select value={defaultTeacher} onChange={e => setDefaultTeacher(e.target.value)} className="w-full bg-[#3d3935] text-white rounded-lg p-2">
                                <option value="google">Google Gemini</option>
                                <option value="groq">Groq Llama 3</option>
                                <option value="openrouter">OpenRouter</option>
                            </select>
                        </div>
                    </div>

                    <div className="mt-6 flex justify-between items-center border-t border-[#7a8575] pt-4">
                        <div className="text-sm font-bold text-[#e6e9e4]">{diagMsg}</div>
                        <button onClick={saveCustomKey} className="bg-[#f4f1ea] text-[#524d46] px-8 py-3 rounded-xl font-black shadow-lg hover:scale-105 transition-transform active:scale-95">💾 儲存所有設定</button>
                    </div>
                  </div>
                </div>
              )}

              {/* 主要測驗內容 */}
              <main className="max-w-4xl mx-auto p-4 mt-6">
                  {questions.length === 0 ? (
                      <div className="text-center p-12 bg-[#f4f1ea] rounded-[3rem] border-4 border-dashed border-[#d6cfc5]">
                          <Sparkles size={48} className="mx-auto text-[#cca677] mb-4"/>
                          <h2 className="text-2xl font-black mb-4">準備好開始挑戰了嗎？</h2>
                          <button onClick={() => window.location.reload()} className="bg-[#cca677] text-white px-8 py-4 rounded-2xl font-black shadow-lg">點擊載入題目清單</button>
                      </div>
                  ) : (
                      <div className="space-y-6">
                        {/* 這裡渲染你的問題清單... */}
                      </div>
                  )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><SpellingHeroApp /></ErrorBoundary>);
    </script>
</body>
</html>
